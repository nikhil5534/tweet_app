{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            TweetHQ
        {% endblock %}
    </title>

    <!-- Bootstrap CSS (stable version) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <!-- Brand -->
        <a class="navbar-brand" href="{% url 'tweet_list' %}">TweetHQ</a>

        <!-- Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Content -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'tweet_list' %}">Home</a>
                </li>
            </ul>

            <!-- Search -->
            <form class="d-flex me-3" role="search">
                <input class="form-control me-2" type="search" placeholder="Search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>

            <!-- Auth Section -->
            {% if user.is_authenticated %}

                <!-- Create Tweet -->
                <a href="{% url 'tweet_create' %}" class="btn btn-primary me-2">
                    Create
                </a>

                <!-- Logout (POST only) -->
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Logout</button>
                </form>

            {% else %}

                <!-- Login -->
                <a href="{% url 'login' %}" class="btn btn-primary me-2">
                    Login
                </a>

                <!-- Register -->
                <a href="{% url 'register' %}" class="btn btn-success">
                    Register
                </a>

            {% endif %}

        </div>
    </div>
</nav>

<!-- ✅ MAIN CONTENT -->
<main class="container mt-4">
    {% block content %}
        <p>Content not found.</p>
    {% endblock %}
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script>
function toggleComments(tweetId) {
    const section = document.getElementById(`comments-${tweetId}`);
    if (section.style.display === "none") {
        section.style.display = "block";
    } else {
        section.style.display = "none";
    }
}
function toggleComments(tweetId) {
    const section = document.getElementById(`comments-${tweetId}`);
    section.style.display = section.style.display === "block" ? "none" : "block";
}

function toggleEdit(commentId) {
    const view = document.getElementById(`comment-view-${commentId}`);
    const edit = document.getElementById(`comment-edit-${commentId}`);

    if (edit.style.display === "none") {
        edit.style.display = "block";
        view.style.display = "none";
    } else {
        edit.style.display = "none";
        view.style.display = "block";
    }
}
</script>

</body>
</html>
