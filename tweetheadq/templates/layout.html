{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            TweetHQ
        {% endblock %}
    </title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <!-- Brand -->
        <a class="navbar-brand" href="{% url 'tweet_list' %}">TweetHQ</a>

        <!-- Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Content -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'tweet_list' %}">Home</a>
                </li>
            </ul>

            <!-- 🔍 Search -->
            <div class="d-flex align-items-center position-relative me-3 flex-grow-1" style="max-width: 250px;">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="form-control form-control-sm"
                    placeholder="Search users..."
                    autocomplete="off"
                >

                <div id="searchResults" 
                     class="list-group position-absolute top-100 start-0 w-100 shadow mt-1 d-none"
                     style="z-index: 2000;">
                </div>
            </div>

            <!-- Auth Section -->
            {% if user.is_authenticated %}
                <div class="d-flex align-items-center gap-2">

                    <span class="text-white">@{{ user.username }}</span>

                    <a href="{% url 'tweet_create' %}" class="btn btn-primary btn-sm">
                        Create
                    </a>

                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">Logout</button>
                    </form>

                </div>
            {% else %}

                <div class="d-flex gap-2">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-success btn-sm">Register</a>
                </div>

            {% endif %}

        </div>
    </div>
</nav>

<!-- ✅ MAIN CONTENT -->
<main class="container mt-4">
    {% block content %}
        <p>Content not found.</p>
    {% endblock %}
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ Custom JS -->
<script>
    document.addEventListener("DOMContentLoaded", function () {

    const input = document.getElementById("searchInput");
    const resultsBox = document.getElementById("searchResults");

    let timeout = null;

    input.addEventListener("keyup", function () {
        const query = input.value.trim();

        clearTimeout(timeout);

        if (query.length < 2) {
            resultsBox.classList.add("d-none");
            resultsBox.innerHTML = "";
            return;
        }

        timeout = setTimeout(() => {
            fetch(`/search-users/?q=${query}`)
                .then(res => res.json())
                .then(data => {

                    resultsBox.innerHTML = "";

                    if (data.results.length === 0) {
                        resultsBox.innerHTML = `
                            <div class="list-group-item text-muted">
                                No users found
                            </div>
                        `;
                    } else {
                        data.results.forEach(user => {

                            const item = document.createElement("a");
                            item.classList.add("list-group-item", "list-group-item-action");

                            item.textContent = user.username;
                            item.href = `/profile/${user.id}/`;

                            resultsBox.appendChild(item);
                        });
                    }

                    resultsBox.classList.remove("d-none");
                })
                .catch(error => {
                    console.error("Search error:", error);
                });
        }, 300);
    });

    // Hide dropdown on outside click
    document.addEventListener("click", function (e) {
        if (!input.contains(e.target) && !resultsBox.contains(e.target)) {
            resultsBox.classList.add("d-none");
        }
    });

});

// Existing functions (cleaned)
function toggleComments(tweetId) {
    const section = document.getElementById(`comments-${tweetId}`);
    section.style.display = section.style.display === "block" ? "none" : "block";
}

function toggleEdit(commentId) {
    const view = document.getElementById(`comment-view-${commentId}`);
    const edit = document.getElementById(`comment-edit-${commentId}`);

    if (edit.style.display === "none") {
        edit.style.display = "block";
        view.style.display = "none";
    } else {
        edit.style.display = "none";
        view.style.display = "block";
    }
}
</script>
</body>
</html>
