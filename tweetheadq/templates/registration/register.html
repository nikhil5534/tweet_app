{% extends "layout.html" %}

{% block content %}
<h2>Register Form</h2>
<form method="post">
{% csrf_token %}

{% for field in form %}
    <div class="mb-3">
        {{ field.label_tag }}
        {{ field }}
        
        <!-- ✅ THIS SHOWS ERRORS -->
        <div style="color:red;">
            {{ field.errors }}
        </div>
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-success">Register</button>
</form>
{% endblock %}
